  # the full `/nemo/gym/` basepath with a leading slash. See nemo-curator's docs.yml.
  # Legacy Sphinx top-level entry points (Main is now the default version)
  - source: "/nemo/gym/index.html"
    destination: "/nemo/gym/main"
  - source: "/nemo/gym/index"
    destination: "/nemo/gym/main"
  # Legacy Sphinx page paths → current Fern slugs
  - source: "/nemo/gym/about/concepts/configuration-system.html"
    destination: "/nemo/gym/main/reference/configuration"
  - source: "/nemo/gym/about/concepts/core-abstractions.html"
    destination: "/nemo/gym/main/about/architecture"
  - source: "/nemo/gym/get-started/setup-installation.html"
    destination: "/nemo/gym/get-started/installation"
  - source: "/nemo/gym/how-to-faq.html"
    destination: "/nemo/gym/reference/faq"
