    destination: "/nemo/gym/main/infrastructure/engineering-notes/system-design"
  - source: "/nemo/gym/latest/about/concepts/task-verification"
    destination: "/nemo/gym/main/build-verifiers"
  - source: "/nemo/gym/latest/about/concepts/configuration"
    destination: "/nemo/gym/main/reference/configuration"
  - source: "/nemo/gym/latest/about/concepts/training-approaches"
    destination: "/nemo/gym/main/about/concepts/training"
  - source: "/nemo/gym/latest/environment-tutorials/designing-customer-evaluation"
    destination: "/nemo/gym/main/environment-tutorials"
  - source: "/nemo/gym/v0.2.1/environment-tutorials/real-world-data-generation"
    destination: "/nemo/gym/v0.2.1/environment-tutorials/real-world-environment/generating-training-data"
  - source: "/nemo/gym/v0.2.1/environment-tutorials/real-world-implementation"
    destination: "/nemo/gym/v0.2.1/environment-tutorials/real-world-environment/resources-server-implementation"
  - source: "/nemo/gym/latest/environment-tutorials/real-world-data-generation"
    destination: "/nemo/gym/main/environment-tutorials/real-world-environment/generating-training-data"
  - source: "/nemo/gym/latest/environment-tutorials/real-world-implementation"
    destination: "/nemo/gym/main/environment-tutorials/real-world-environment/resources-server-implementation"
  # Flatten /latest/get-started consolidation in one hop:
  # detailed-setup → installation, rollout-collection → quickstart
  - source: "/nemo/gym/latest/get-started/detailed-setup"
    destination: "/nemo/gym/main/get-started/installation"
  - source: "/nemo/gym/latest/get-started/rollout-collection"
    destination: "/nemo/gym/main/get-started/quickstart"
  # Pages that only existed under v0.2.1's structure (no /main/ equivalent at the same path)
  # - `benchmarks/` was folded into `evaluation/` on main
  # - `documentation/home` no longer exists; send to the main root
  # - `pypi-install` was consolidated into `installation` on main
  - source: "/nemo/gym/latest/benchmarks/adding-a-benchmark"
    destination: "/nemo/gym/main/contribute/environments/adding-a-benchmark"
  - source: "/nemo/gym/main/evaluation/adding-a-benchmark"
    destination: "/nemo/gym/main/contribute/environments/adding-a-benchmark"
  - source: "/nemo/gym/latest/benchmarks/designing-customer-evaluation"
    destination: "/nemo/gym/main/environment-tutorials"
  - source: "/nemo/gym/latest/benchmarks/run-benchmark-suite"
    destination: "/nemo/gym/main/environment-tutorials"
  - source: "/nemo/gym/latest/benchmarks"
    destination: "/nemo/gym/main/environment-tutorials"
  - source: "/nemo/gym/latest/documentation/home"
    destination: "/nemo/gym/main"
  - source: "/nemo/gym/latest/get-started/pypi-install"
    destination: "/nemo/gym/main/get-started/installation"
  - source: "/nemo/gym/latest/get-started"
    destination: "/nemo/gym/main/get-started/installation"
  # Version alias: v0.2 → v0.2.1
  - source: "/nemo/gym/v0.2"
    destination: "/nemo/gym/v0.2.1"
  - source: "/nemo/gym/v0.2/:path*"
    destination: "/nemo/gym/v0.2.1/:path*"
  # Legacy/no-prefix version slugs that pre-date the Fern `v` convention.
  # 0.2.1 and 0.2.0 → pinned GA at v0.2.1.
  - source: "/nemo/gym/0.2.1"
    destination: "/nemo/gym/v0.2.1"
  - source: "/nemo/gym/0.2.1/:path*"
    destination: "/nemo/gym/v0.2.1/:path*"
  - source: "/nemo/gym/0.2.0"
    destination: "/nemo/gym/v0.2.1"
  - source: "/nemo/gym/0.2.0/:path*"
    destination: "/nemo/gym/v0.2.1/:path*"
  # README/blog links that pointed to Sphinx pages whose canonical was renamed in Fern
  - source: "/nemo/gym/latest/training-tutorials/unsloth-training"
    destination: "/nemo/gym/main/training-tutorials/unsloth"
  - source: "/nemo/gym/latest/apidocs"
    destination: "/nemo/gym/api/reference/api-reference"
  - source: "/nemo/gym/latest/environment-tutorials/creating-training-environment"
    destination: "/nemo/gym/main/environment-tutorials/single-step-environment"
  # Version-root index.html: explicit because :path* does not match the empty-path case
  - source: "/nemo/gym/latest/index.html"
    destination: "/nemo/gym/main"
  - source: "/nemo/gym/v0.2.1/index.html"
    destination: "/nemo/gym/v0.2.1"
  - source: "/nemo/gym/main/index.html"
    destination: "/nemo/gym/main"
  # Catch-all: Sphinx `.../index.html` → Fern canonical (must precede `.html` catch-all)
  - source: "/nemo/gym/latest/:path*/index.html"
    destination: "/nemo/gym/main/:path*"
  - source: "/nemo/gym/v0.2.1/:path*/index.html"
    destination: "/nemo/gym/v0.2.1/:path*"
  - source: "/nemo/gym/:path*/index.html"
    destination: "/nemo/gym/:path*"
  # Catch-all: Sphinx `foo.html` → Fern canonical `foo`
  # Must precede the /latest/:path* wildcard so that /latest/...html strips
  # extension first, allowing the specific /latest/... page-reorg rules above
  # to fire on the no-extension form before the slug-only catch-all takes over.
  - source: "/nemo/gym/:path*.html"
    destination: "/nemo/gym/:path*"
  # LLM-as-Judge and Verification Patterns moved from Environment Tutorials to Build Verifiers
  - source: "/nemo/gym/environment-tutorials/llm-as-judge-verification"
    destination: "/nemo/gym/main/build-verifiers/verification-patterns/llm-as-judge"
  - source: "/nemo/gym/main/environment-tutorials/llm-as-judge-verification"
