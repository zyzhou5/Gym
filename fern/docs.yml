instances:
  - url: nvidia-gym.docs.buildwithfern.com/nemo/gym
    custom-domain: docs.nvidia.com/nemo/gym

title: NeMo Gym

global-theme: nvidia

# Local override attempt: the `nvidia` global theme hardcodes `right-text: Documentation`.
# Keep a partial child-side `logo:` block to override just the right-text while inheriting
# the SVGs/height/href from the theme. Mirrors the approach taken in NVIDIA-NeMo/Curator.
logo:
  right-text: NeMo Gym

navbar-links:
  - type: github
    value: https://github.com/NVIDIA-NeMo/Gym

libraries:
  nemo-gym:
    input:
      git: https://github.com/NVIDIA-NeMo/Gym
      subpath: nemo_gym
    output:
      path: ./product-docs/nemo-gym/Full-Library-Reference
    lang: python

experimental:
  mdx-components:
    - ./components
  basepath-aware: true

versions:
  - display-name: Main
    path: versions/main.yml
    slug: main
  - display-name: "0.3.0"
    path: versions/v0.3.0.yml
    slug: v0.3.0
    availability: stable
  - display-name: "0.2.1"
    path: versions/v0.2.1.yml
    slug: v0.2.1
    availability: stable

redirects:
