    destination: "/nemo/gym/training-tutorials/nemo-rl-grpo/single-node-training"
  - source: "/nemo/gym/tutorials/offline-training-w-rollouts.html"
    destination: "/nemo/gym/training-tutorials/offline-training-w-rollouts"
  # Renamed/moved pages within the Fern site
  # `detailed-setup` → `installation` (closest equivalent on main);
  # `rollout-collection` → `quickstart` (folded into the quickstart flow).
  # Both still exist on `latest` (sourced from v0.2.1, the current GA).
